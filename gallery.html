   
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guesboth Wedding Surya Leli</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            padding-bottom: 50px;
        }

        /* Header Ala Profil Instagram */
        .instagram-header {
            max-width: 935px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dbdbdb;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(20deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 4px;
           object-fit: cover;
            margin-right: 60px;
        }
        .profile-avatar img {
            width: 90px;
            height: 90%;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            border: 4px solid white;
        }
        .profile-info h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 15px;
        }
        .profile-bio {
            font-size: 16px;
            line-height: 24px;
        }
        .profile-bio strong { font-weight: 600; }

        /* Grid Foto 3 Kolom (Instagram Feed) */
        .instagram-feed {
            max-width: 935px;
            margin: 30px auto 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px; /* Jarak antar foto standar IG Desktop */
            padding: 0 20px;
        }

        /* Item Foto berbentuk Kotak 1:1 */
        .feed-item {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Trik CSS untuk memaksa rasio 1:1 (Kotak Sempurna) */
            cursor: pointer;
            overflow: hidden;
            background-color: #efefef;
        }
        .feed-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* Overlay Gelap Saat Hover (Muncul Nama & Ucapan) */
        .feed-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
            text-align: center;
        }
        .feed-item:hover .feed-overlay {
            opacity: 1;
        }
        .overlay-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .overlay-wish {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
        }

        /* Indikator Loading */
        .loader {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: #8e8e8e;
        }

        /* Responsif untuk HP (Gap mengecil seperti aplikasi IG asli) */
        @media (max-width: 768px) {
            .instagram-header {
                padding: 20px;
                flex-direction: row;
            }
            .profile-avatar {
                width: 90px;
                height: 90px;
                margin-right: 25px;
            }
            .profile-info h1 { font-size: 22px; }
            .instagram-feed {
                gap: 3px; /* Gap sangat tipis ala IG Mobile */
                padding: 0;
            }
            /* Pada HP, buat ucapan langsung terlihat sedikit di bawah atau tetap overlay saat ditgetuk */
            .feed-overlay { padding: 10px; }
            .overlay-name { font-size: 14px; }
            .overlay-wish { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- Bagian Profil Atas -->
    <header class="instagram-header">
        <div class="profile-avatar">
            <!-- Ganti dengan foto pengantin / logo acara -->
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500" alt="Acara Logo">
        </div>
        <div class="profile-info">
            <h1>The Wedding of Surya Dan Leli</h1></h1>
            <div class="profile-bio">
                <strong>GuestBooth Digital Album</strong><br>
                ✨ Diabadikan oleh para tamu undangan kesayangan.<br>
                📍 Gedung Serbaguna, Masjid Hijau Grage City
            </div>
        </div>
    </header>

    <!-- Kontainer Feed Foto -->
    <div id="loader" class="loader">Memuat feed galeri...</div>
    <main class="instagram-feed" id="instagramFeed"></main>

    <script>
        // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4yIWS-foqFjDCMoBllcGOTafofG70I0e8bYOMZBXyxttLeAMWBYd6TnskomyKXLQpIg/exec";

        function muatGaleriInstagram() {
            fetch(WEB_APP_URL)
                .then(response => response.json())
                .then(res => {
                    const loader = document.getElementById('loader');
                    const feed = document.getElementById('instagramFeed');
                    
                    loader.style.display = 'none';
                    feed.innerHTML = ''; 

                    if(res.result === "success" && res.data.length > 0) {
                        // Urutkan dari foto yang paling baru diupload (seperti feed nyata)
                        const dataTerbaru = res.data.reverse();

                        dataTerbaru.forEach(tamu => {
                            // Konversi link Google Drive agar bisa langsung tampil ke gambar
                           // HAPUS logika konversi yang lama, GANTI dengan yang ini:
let srcFoto = tamu.linkFoto;

// Pastikan link tidak kosong
if (srcFoto) {
    let fileId = "";
    
    // Pola 1: Jika link mengandung 'id='
    if (srcFoto.includes('id=')) {
        fileId = srcFoto.split('id=')[1].split('&')[0];
    } 
    // Pola 2: Jika link mengandung '/d/...'
    else if (srcFoto.includes('/d/')) {
        fileId = srcFoto.split('/d/')[1].split('/')[0];
    }
    
    // Gunakan endpoint Google Drive Thumbnail (Lebih stabil untuk tag img)
    if (fileId) {
        srcFoto = `https://lh3.googleusercontent.com/u/0/d/${fileId}=w400-h400-p`;
    }
}

                            // Struktur HTML ala postingan grid Instagram
                            const postItem = `
                                <div class="feed-item">
                                    <img src="${srcFoto}" alt="Foto dari ${tamu.nama}" loading="lazy">
                                    <div class="feed-overlay">
                                        <div class="overlay-name">👤 ${tamu.nama}</div>
                                        <div class="overlay-wish">"${tamu.keterangan}"</div>
                                    </div>
                                </div>
                            `;
                            feed.innerHTML += postItem;
                        });
                    } else {
                        feed.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#8e8e8e; padding: 40px;">Belum ada kiriman foto.</p>`;
                    }
                })
                .catch(err => {
                    console.error("Gagal memuat feed:", err);
                    document.getElementById('loader').innerText = "Gagal memuat feed Instagram.";
                });
        }

        // Jalankan fungsi saat web dibuka
        muatGaleriInstagram();

        // Auto refresh setiap 20 detik agar feed terus update otomatis di layar laptop/proyektor
        setInterval(muatGaleriInstagram, 20000);
    </script>
</body>
</html>
